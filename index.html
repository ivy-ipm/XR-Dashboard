<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise!</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
  }

  .input-screen, .animation-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: #111;
  }

  input, button {
    padding: 10px;
    margin: 5px;
    font-size: 18px;
    border-radius: 5px;
    border: none;
  }

  button {
    cursor: pointer;
    background-color: #e91e63;
    color: white;
  }

  .curtain {
    position: absolute;
    width: 50%;
    height: 100%;
    top: 0;
    background: red;
    z-index: 10;
    transition: all 2s ease;
  }

  .curtain.left { left: 0; }
  .curtain.right { right: 0; }

  .curtain.open.left { transform: translateX(-100%); }
  .curtain.open.right { transform: translateX(100%); }

  .cake {
    margin-top: 50px;
    position: relative;
  }

  .candles {
    position: absolute;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }

  .candle {
    width: 10px;
    height: 40px;
    background: yellow;
    border-radius: 2px;
    position: relative;
  }

  .flame {
    width: 10px;
    height: 10px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -10px;
    left: 0;
    animation: flicker 0.3s infinite alternate;
  }

  @keyframes flicker {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(1.3); opacity: 0.7; }
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ff0;
    opacity: 0;
  }

  h1 { font-size: 3em; margin: 20px 0; }
</style>
</head>
<body>

<div class="input-screen">
  <h2>Enter Birthday Details</h2>
  <input type="text" id="nameInput" placeholder="Name">
  <input type="number" id="ageInput" placeholder="Age">
  <button onclick="startBirthday()">Celebrate!</button>
</div>

<div class="animation-screen" style="display:none;">
  <div class="curtain left"></div>
  <div class="curtain right"></div>

  <h1 id="greeting"></h1>

  <div class="cake">
    <img src="https://i.ibb.co/1Ld0qvX/birthday-cake.png" alt="Cake" width="200">
    <div class="candles" id="candles"></div>
  </div>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
function startBirthday() {
  const name = document.getElementById('nameInput').value || 'Friend';
  const age = document.getElementById('ageInput').value || '0';

  localStorage.setItem('birthdayName', name);
  localStorage.setItem('birthdayAge', age);

  document.querySelector('.input-screen').style.display = 'none';
  const animScreen = document.querySelector('.animation-screen');
  animScreen.style.display = 'flex';

  const greeting = document.getElementById('greeting');
  greeting.innerText = `Happy ${age}th Birthday, ${name}!`;

  // Curtains open
  document.querySelector('.curtain.left').classList.add('open');
  document.querySelector('.curtain.right').classList.add('open');

  // Play music
  const music = document.getElementById('music');
  music.play();

  // Add candles
  const candlesContainer = document.getElementById('candles');
  candlesContainer.innerHTML = '';
  for (let i = 0; i < age; i++) {
    const candle = document.createElement('div');
    candle.className = 'candle';
    const flame = document.createElement('div');
    flame.className = 'flame';
    candle.appendChild(flame);
    candlesContainer.appendChild(candle);
  }

  // Confetti animation
  for (let i = 0; i < 100; i++) {
    createConfetti();
  }

  // Show inputs again after 15s
  setTimeout(() => {
    animScreen.style.display = 'none';
    document.querySelector('.input-screen').style.display = 'flex';
  }, 15000);
}

function createConfetti() {
  const confetti = document.createElement('div');
  confetti.className = 'confetti-piece';
  document.body.appendChild(confetti);
  confetti.style.left = Math.random() * window.innerWidth + 'px';
  confetti.style.top = '-20px';
  confetti.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
  confetti.style.opacity = 1;

  const fall = setInterval(() => {
    const top = parseFloat(confetti.style.top);
    if(top > window.innerHeight) {
      confetti.remove();
      clearInterval(fall);
    } else {
      confetti.style.top = top + 5 + 'px';
      confetti.style.transform = `rotate(${Math.random()*360}deg)`;
    }
  }, 20);
}

// Check if there's stored name/age
window.onload = () => {
  const storedName = localStorage.getItem('birthdayName');
  const storedAge = localStorage.getItem('birthdayAge');
  if(storedName && storedAge) {
    document.getElementById('nameInput').value = storedName;
    document.getElementById('ageInput').value = storedAge;
  }
};
</script>

</body>
</html>
